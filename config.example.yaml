# Backend WebSocket servers
# Messages from iLink are broadcast to all backends in order.
# Each backend independently receives messages and can send replies.
#
# Option A: Single backend (legacy format)
# yunzai:
#   host: "127.0.0.1"
#   port: 2536
#   reconnect_interval: 5000
#
# Option B: Multi-backend format
backends:
  # ComWeChat backend (Yunzai-Bot)
  - name: "yunzai"
    type: "comwechat"            # ComWeChat protocol (default if omitted)
    host: "127.0.0.1"
    port: 2536
    path: "/ComWeChat"           # WebSocket endpoint path
    reconnect_interval: 5000

  # gsuid_core backend (早柚核心) - uncomment to enable
  # - name: "gsuid-core"
  #   type: "gsuidcore"          # gsuid_core protocol
  #   host: "127.0.0.1"
  #   port: 8765                 # gsuid_core default port
  #   bot_id: "wechat"           # bot_id in the WS path /ws/{bot_id}
  #   token: ""                  # WS_TOKEN authentication (empty for local)
  #   reconnect_interval: 5000

# iLink protocol settings
ilink:
  base_url: "https://ilinkai.weixin.qq.com"
  cdn_base_url: "https://novac2c.cdn.weixin.qq.com/c2c"
  channel_version: "1.0.2"
  poll_timeout_ms: 40000
  api_timeout_ms: 15000

# Web management server
web:
  enabled: true
  host: "0.0.0.0"
  port: 3001
  # Public-facing host for invite links, used to generate shareable device binding URLs
  # If you need a port, include it in the host (e.g. "https://your-domain.com:3001")
  # Leave empty to use the server's own address (without port)
  # invite_host: "https://your-domain.com"

# Data directory for tokens and session state
data_dir: "./data"

# Logging level: debug, info, warn, error
log_level: "info"
